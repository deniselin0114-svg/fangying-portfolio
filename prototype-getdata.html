<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get data — Fabric Real-Time hub prototype</title>
  <meta name="description" content="Interactive 1:1 prototype of the Microsoft Fabric Real-Time hub Get data flow — browse streaming sources and run the connect wizard." />
  <style>
    :root {
      --fab-green: #0f7b3f;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font);
      background: #1b1b1b;
      color: #e8e8e8;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 12px; height: 100vh; height: 100dvh; overflow: hidden;
    }
    button { font-family: inherit; cursor: pointer; }

    .topbar {
      width: 100%;
      display: flex; align-items: center; gap: 12px; flex: 0 0 auto;
    }
    .topbar a {
      display: inline-flex; align-items: center; gap: 0.4rem;
      text-decoration: none; font-weight: 600; font-size: 13px; color: #cfcfcf;
      padding: 6px 12px; border: 1px solid #3a3a3a; border-radius: 8px;
      transition: background 0.18s var(--ease), color 0.18s var(--ease);
    }
    .topbar a:hover { background: #2a2a2a; color: #fff; }
    .topbar__title { font-size: 13px; color: #9a9a9a; }
    .topbar__title strong { color: #fff; font-weight: 600; }
    .topbar__crumb { font-size: 12px; color: #7a7a7a; margin-left: 4px; }
    .topbar__reset {
      margin-left: auto; background: #2a2a2a; border: 1px solid #3a3a3a; color: #cfcfcf;
      border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600;
    }
    .topbar__reset:hover { background: #333; color: #fff; }

    .stagewrap {
      flex: 1 1 auto; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .device {
      height: 100%; width: auto; max-width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px; overflow: hidden; position: relative;
      box-shadow: 0 24px 70px -20px rgba(0,0,0,0.65);
      background: #faf9f8;
    }
    .screen { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.22s var(--ease); }
    .screen.is-active { opacity: 1; pointer-events: auto; }
    .screen img {
      display: block; width: 100%; height: 100%; object-fit: cover;
      user-select: none; -webkit-user-drag: none;
    }

    .spot {
      position: absolute; cursor: pointer; border-radius: 6px; border: 0;
      transition: background 0.15s var(--ease), box-shadow 0.18s var(--ease), transform 0.18s var(--ease);
      background: transparent;
    }
    /* Buttons / generic hotspots: subtle neutral hover (Figma-style) */
    .spot:hover { background: rgba(0,0,0,0.045); }
    .spot:active { background: rgba(0,0,0,0.07); }
    /* Source tile cards: elevation shadow + slight lift, no fill/stroke */
    .spot--card {
      border-radius: 8px;
      box-shadow: 0 0 0 0 rgba(0,0,0,0);
    }
    .spot--card:hover {
      background: transparent;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(0,0,0,0.22), 0 2px 6px -2px rgba(0,0,0,0.12);
    }
    .spot--card:active { transform: translateY(-1px); }
    .spot--close:hover { background: rgba(0,0,0,0.06); }
    .spot--map:hover { background: rgba(0,0,0,0.035); }

    /* Pulse guide on the primary action of each screen */
    .spot--cta::after {
      content: ""; position: absolute; inset: -3px; border-radius: 8px;
      box-shadow: 0 0 0 2px rgba(13,153,255,0.85); opacity: 0;
      animation: pulse 2s var(--ease) infinite; pointer-events: none;
    }
    @keyframes pulse {
      0% { opacity: 0.9; transform: scale(1); }
      70% { opacity: 0; transform: scale(1.12); }
      100% { opacity: 0; }
    }

    .hintbar {
      width: 100%; display: flex; align-items: center; gap: 10px; flex: 0 0 auto;
      font-size: 12.5px; color: #9a9a9a;
    }
    .hintbar .dot { width: 7px; height: 7px; border-radius: 50%; background: #0f7b3f; flex: 0 0 auto; }
    .hintbar strong { color: #cfcfcf; font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      .spot--cta::after { animation: none; opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="custom-connector.html">← Back to case study</a>
    <span class="topbar__title"><strong>Get data</strong> — Fabric Real-Time hub prototype</span>
    <span class="topbar__crumb" id="crumb"></span>
    <button class="topbar__reset" id="resetBtn" type="button">↺ Restart</button>
  </div>

  <div class="stagewrap">
    <div class="device" id="device"></div>
  </div>

  <div class="hintbar">
    <span class="dot"></span>
    <span id="hint"></span>
  </div>

  <script>
  (function () {
    "use strict";
    var BASE = "assets/getdata/";

    // Card grid for the Get data page (percent of the 1920×1080 frame).
    var colLefts = [17.6, 38.05, 58.5, 78.95];
    var cardW = 19.6, rowH = 8.8;
    var rows = [
      { top: 29.0, cols: 4 }, // Recommended row 1
      { top: 39.7, cols: 2 }, // Recommended row 2
      { top: 54.2, cols: 4 }, // A row 1
      { top: 65.0, cols: 4 }, // A row 2
      { top: 75.9, cols: 4 }, // A row 3
      { top: 86.8, cols: 1 }  // A row 4
    ];
    var cardSpots = [];
    rows.forEach(function (r) {
      for (var c = 0; c < r.cols; c++) {
        cardSpots.push({ x: colLefts[c], y: r.top, w: cardW, h: rowH, to: "connect", cls: "spot--card" });
      }
    });

    var wizClose = { x: 85.1, y: 12.2, w: 2.2, h: 3.0, cls: "spot--close" };

    var screens = {
      table: {
        img: "1-table.png",
        hint: "<strong>Streaming data</strong> — select <strong>Get data</strong> to browse sources.",
        spots: [ { x: 94.4, y: 40.6, w: 4.4, h: 3.7, to: "getdata", cls: "spot--cta" } ]
      },
      getdata: {
        img: "2-getdata.png",
        hint: "<strong>Add data</strong> — hover and select any streaming source card.",
        spots: cardSpots
      },
      connect: {
        img: "3-connect.png",
        hint: "<strong>Connect to source</strong> — choose a location on the map.",
        spots: [
          { x: 26.8, y: 40.0, w: 59.0, h: 40.0, to: "connectSel", cls: "spot--map spot--cta" },
          Object.assign({ to: "getdata" }, wizClose)
        ]
      },
      connectSel: {
        img: "4-connect-selected.png",
        hint: "<strong>Connect to source</strong> — location selected. Select <strong>Next</strong>.",
        spots: [
          { x: 29.4, y: 85.2, w: 3.0, h: 3.5, to: "stream", cls: "spot--cta" },
          { x: 26.2, y: 85.2, w: 2.9, h: 3.5, to: "getdata" },
          Object.assign({ to: "getdata" }, wizClose)
        ]
      },
      stream: {
        img: "5-stream.png",
        hint: "<strong>Stream</strong> — preview the incoming data, then select <strong>Next</strong>.",
        spots: [
          { x: 29.4, y: 85.2, w: 3.0, h: 3.5, to: "destination", cls: "spot--cta" },
          { x: 26.2, y: 85.2, w: 2.9, h: 3.5, to: "connectSel" },
          Object.assign({ to: "getdata" }, wizClose)
        ]
      },
      destination: {
        img: "6-destination.png",
        hint: "<strong>Destination + inspect</strong> (optional) — <strong>Skip for now</strong> or pick a destination.",
        spots: [
          { x: 32.9, y: 85.2, w: 4.8, h: 3.5, to: "review", cls: "spot--cta" },
          { x: 26.2, y: 85.2, w: 2.9, h: 3.5, to: "stream" },
          Object.assign({ to: "getdata" }, wizClose)
        ]
      },
      review: {
        img: "7-review.png",
        hint: "<strong>Review and create</strong> — select <strong>Create</strong> to finish.",
        spots: [
          { x: 29.5, y: 85.2, w: 3.2, h: 3.5, to: "done", cls: "spot--cta" },
          { x: 26.2, y: 85.2, w: 2.9, h: 3.5, to: "destination" },
          Object.assign({ to: "getdata" }, wizClose)
        ]
      }
    };

    var crumbs = {
      table: "Real-Time hub › Streaming data",
      getdata: "Real-Time hub › Get data",
      connect: "Get data › Connect to source",
      connectSel: "Get data › Connect to source",
      stream: "Get data › Stream",
      destination: "Get data › Destination + inspect",
      review: "Get data › Review and create"
    };

    var device = document.getElementById("device");
    var hintEl = document.getElementById("hint");
    var crumbEl = document.getElementById("crumb");
    var els = {};
    var current = null;

    Object.keys(screens).forEach(function (k) { var i = new Image(); i.src = BASE + screens[k].img; });

    function buildScreen(id) {
      var def = screens[id];
      var screen = document.createElement("div");
      screen.className = "screen";
      var img = document.createElement("img");
      img.src = BASE + def.img; img.alt = ""; img.draggable = false;
      screen.appendChild(img);
      def.spots.forEach(function (s) {
        var b = document.createElement("button");
        b.type = "button";
        b.className = "spot" + (s.cls ? " " + s.cls : "");
        b.style.left = s.x + "%"; b.style.top = s.y + "%";
        b.style.width = s.w + "%"; b.style.height = s.h + "%";
        b.setAttribute("aria-label", "Go to " + s.to);
        b.addEventListener("click", function (e) { e.stopPropagation(); go(s.to); });
        screen.appendChild(b);
      });
      device.appendChild(screen);
      return screen;
    }

    function go(id) {
      if (id === "done") { go("table"); return; }
      if (!screens[id]) return;
      if (!els[id]) els[id] = buildScreen(id);
      if (current && els[current]) els[current].classList.remove("is-active");
      els[id].classList.add("is-active");
      els[id].querySelectorAll(".spot--cta").forEach(function (n) {
        n.style.animation = "none"; void n.offsetWidth; n.style.animation = "";
      });
      current = id;
      hintEl.innerHTML = screens[id].hint;
      crumbEl.textContent = crumbs[id] || "";
    }

    document.getElementById("resetBtn").addEventListener("click", function () { go("table"); });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && current && current !== "table" && current !== "getdata") go("getdata");
    });

    go("table");
  })();
  </script>
</body>
</html>
